name: Selenium Grid Tests

on:
  workflow_dispatch:
  # Uncomment below to enable automatic run on every push to main
  # push:
  #   branches:
  #     - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_NO_WARNINGS: "1"

jobs:

  chrome:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Chrome Tests
        run: docker compose up --build --abort-on-container-exit --exit-code-from chrome-tests chrome-tests
        continue-on-error: true

      - name: Debug Container State
        if: always()
        run: |
          echo "=== All containers ==="
          docker ps -a
          CID=$(docker compose ps -a -q chrome-tests)
          echo "=== chrome-tests container ID: $CID ==="
          if [ -n "$CID" ]; then
            echo "=== Container logs ==="
            docker logs $CID
            echo "=== Files inside container ==="
            docker cp $CID:/app/target /tmp/_target_debug && ls -R /tmp/_target_debug || echo "No target dir"
          fi

      - name: Copy Reports from Container
        if: always()
        run: |
          mkdir -p reports/chrome
          CID=$(docker compose ps -a -q chrome-tests)
          echo "Container ID: $CID"
          if [ -n "$CID" ]; then
            docker cp $CID:/app/target/. ./reports/chrome/ || echo "WARN: target directory not found in container"
          else
            echo "ERROR: chrome-tests container not found!"
          fi

      - name: Debug Reports Folder
        if: always()
        run: |
          echo "Listing reports folder..."
          ls -R reports || true

      - name: Ensure Chrome Reports Folder Has Content
        if: always()
        run: |
          if [ -z "$(find reports/chrome -type f 2>/dev/null)" ]; then
            echo "No test reports were generated for Chrome." > reports/chrome/no-reports.txt
          fi

      - name: Upload Chrome Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chrome-reports
          path: reports/chrome/
          if-no-files-found: warn

      - name: Stop Containers
        if: always()
        run: docker compose down


  firefox:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Firefox Tests
        run: docker compose up --build --abort-on-container-exit --exit-code-from firefox-tests firefox-tests
        continue-on-error: true

      - name: Debug Container State
        if: always()
        run: |
          echo "=== All containers ==="
          docker ps -a
          CID=$(docker compose ps -a -q firefox-tests)
          echo "=== firefox-tests container ID: $CID ==="
          if [ -n "$CID" ]; then
            echo "=== Container logs ==="
            docker logs $CID
            echo "=== Files inside container ==="
            docker cp $CID:/app/target /tmp/_target_debug && ls -R /tmp/_target_debug || echo "No target dir"
          fi

      - name: Copy Reports from Container
        if: always()
        run: |
          mkdir -p reports/firefox
          CID=$(docker compose ps -a -q firefox-tests)
          echo "Container ID: $CID"
          if [ -n "$CID" ]; then
            docker cp $CID:/app/target/. ./reports/firefox/ || echo "WARN: target directory not found in container"
          else
            echo "ERROR: firefox-tests container not found!"
          fi

      - name: Debug Reports Folder
        if: always()
        run: |
          echo "Listing reports folder..."
          ls -R reports || true

      - name: Ensure Firefox Reports Folder Has Content
        if: always()
        run: |
          if [ -z "$(find reports/firefox -type f 2>/dev/null)" ]; then
            echo "No test reports were generated for Firefox." > reports/firefox/no-reports.txt
          fi

      - name: Upload Firefox Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firefox-reports
          path: reports/firefox/
          if-no-files-found: warn

      - name: Stop Containers
        if: always()
        run: docker compose down
