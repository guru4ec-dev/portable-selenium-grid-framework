name: Selenium Grid Tests

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:

  chrome:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Reports Directory
        run: mkdir -p reports

      - name: Run Chrome Tests
        run: docker compose up --build --scale chrome=3 --abort-on-container-exit --exit-code-from chrome-tests chrome-tests

      - name: Debug Reports Folder
        run: |
          echo "Listing reports folder..."
          ls -R reports || true

      - name: Upload Chrome Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chrome-reports
          path: reports/

      - name: Stop Containers
        if: always()
        run: docker compose down


  firefox:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Reports Directory
        run: mkdir -p reports

      - name: Run Firefox Tests
        run: docker compose up --build --scale firefox=3 --abort-on-container-exit --exit-code-from firefox-tests firefox-tests

      - name: Debug Reports Folder
        run: |
          echo "Listing reports folder..."
          ls -R reports || true

      - name: Upload Firefox Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firefox-reports
          path: reports/

      - name: Stop Containers
        if: always()
        run: docker compose down
