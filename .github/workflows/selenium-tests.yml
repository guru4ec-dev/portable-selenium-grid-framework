name: Selenium Grid Tests

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:

  chrome:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Chrome Tests
        run: docker compose up --build chrome-tests

      - name: Debug Reports Folder
        run: |
          echo "Listing reports folder..."
          ls -R reports || true

      - name: Upload Chrome Reports
        uses: actions/upload-artifact@v4
        with:
          name: chrome-reports
          path: reports/

      - name: Stop Containers
        run: docker compose down


  firefox:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Firefox Tests
        run: docker compose up --build firefox-tests

      - name: Debug Reports Folder
        run: |
          echo "Listing reports folder..."
          ls -R reports || true

      - name: Upload Firefox Reports
        uses: actions/upload-artifact@v4
        with:
          name: firefox-reports
          path: reports/

      - name: Stop Containers
        run: docker compose down
