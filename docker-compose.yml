version: "3.8"

services:

  selenium-hub:
    image: selenium/hub:4.21.0
    container_name: selenium-hub
    ports:
      - "4444:4444"
      - "4442:4442"
      - "4443:4443"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/wd/hub/status"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 15s

  chrome:
    image: selenium/node-chrome:latest
    depends_on:
      selenium-hub:
        condition: service_healthy
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
    shm_size: 2gb

  firefox:
    image: selenium/node-firefox:latest
    depends_on:
      selenium-hub:
        condition: service_healthy
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
    shm_size: 2gb

  chrome-tests:
    build: .
    depends_on:
      selenium-hub:
        condition: service_healthy
      chrome:
        condition: service_started
    environment:
      - GRID_URL=http://selenium-hub:4444
    command: sh -c "sleep 15 && mvn verify -Dbrowser=chrome -Dheadless=false -DlogLevel=INFO"
    volumes:
      - ./reports/chrome:/app/target/cucumber-html-reports

  firefox-tests:
    build: .
    depends_on:
      selenium-hub:
        condition: service_healthy
      firefox:
        condition: service_started
    environment:
      - GRID_URL=http://selenium-hub:4444
    command: sh -c "sleep 15 && mvn verify -Dbrowser=firefox -Dheadless=false -DlogLevel=INFO"
    volumes:
      - ./reports/firefox:/app/target/cucumber-html-reports