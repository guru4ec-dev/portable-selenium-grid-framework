version: "3.8"

services:

  selenium-hub:
    image: selenium/hub:4.21.0
    container_name: selenium-hub
    ports:
      - "4444:4444"
      - "4442:4442"
      - "4443:4443"

  chrome:
    image: selenium/node-chrome:4.21.0
    container_name: chrome-node
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
    shm_size: 2gb

  firefox:
    image: selenium/node-firefox:4.21.0
    container_name: firefox-node
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
    shm_size: 2gb

  chrome-tests:
    build: .
    depends_on:
      - selenium-hub
      - chrome
    environment:
      - GRID_URL=http://selenium-hub:4444
    command: sh -c "sleep 15 && mvn test -Dbrowser=chrome -Dheadless=false -DlogLevel=INFO"
    volumes:
      - ./reports:/app/target

  firefox-tests:
    build: .
    depends_on:
      - selenium-hub
      - firefox
    environment:
      - GRID_URL=http://selenium-hub:4444
    command: sh -c "sleep 15 && mvn test -Dbrowser=firefox -Dheadless=false -DlogLevel=INFO"
    volumes:
      - ./reports:/app/target